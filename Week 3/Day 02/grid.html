<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="grid.css">
    <title>Grid Assignment</title>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">Pirmary Header & Global Nav</div>
        <div class="box" id="box2">Sidebar</div>
        <div class="box" id="box3">Featured Multimedia Spotlight</div>
        <div class="box" id="box4">Trending Articles & Tags</div>
        <div class="box" id="box5">Card A</div>
        <div class="box" id="box6">Secondary Focus (Nested Grid)
            <div class="nested-grid">
                <div class="nested-box" id="nested-box1">News</div>
                <div class="nested-box" id="nested-box2">Events</div>
                <div class="nested-box" id="nested-box3">Events 2</div>
                <div class="nested-box" id="nested-box4">Blogs</div>
                <div class="nested-box" id="nested-box5">Video</div>
            </div>
        </div>
        <div class="box" id="box7">Card B</div>
        <div class="box" id="box8">Card C</div>
        <div class="box" id="box9">Footer</div>
    </div>
</body>
</html>
