<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form 1</title>
</head>
<body>
    <h1>Survey Form 1</h1>
    <form>  
        Name    :       <input type="text" id="name" name="name" required><br><br>

        Email   :       <input type="email" id="email" name="email" required><br><br>

        Contact :       <input type="tel" id="contact" name="contact"><br><br>

        <Select>    
            <option value="Gender"> Select Gender </option>
            <option value="Gender"> Male </option>
            <option value="Gender"> Female </option>
        </Select><br><br>

       Exam City :     <input type="radio" id="Exam City" name="Exam City" value="Lahore">
        <label for="Lahore">Lahore</label>
        <input type="radio" id="Exam City" name="Exam City" value="Karachi">
        <label for="Karachi">Karachi</label>
        <input type="radio" id="Exam City" name="Exam City" value="Islamabad">
        <label for="Islamabad">Islamabad</label><br><br>

       Subject  :       <input type="checkbox" id="Subjects" name="Subjects" value="Maths">
        <label for="Maths">Maths</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Physics">       
        <label for="Physics">Physics</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Chemistry">
        <label for="Chemistry">Chemistry</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Biology">
        <label for="Biology">Biology</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Computer Science">  
        <label for="Computer Science">Computer Science</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="English">
        <label for="English">English</label><br><br>

        Comments :      <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br><br>

        <img src="https://www.simplilearn.com/ice9/free_resources_article_thumb/full-stack-developer.jpg" alt="Full Stack Developer Skills Grid" width="200"><br><br>
        
        <input type="submit" value="Submit"><br><br><br>
        </form>

        <h1>Survey Form 2 (With use of labels)</h1>
        <form>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="contact">Contact Number:</label><br>
        <input type="tel" id="contact" name="contact"><br><br>

        <Select>    
            <option value="Gender"> Select Gender </option>
            <option value="Gender"> Male </option>
            <option value="Gender"> Female </option>
        </Select><br><br>

        <label for="Exam City">Exam City:</label><br>
        <input type="radio" id="Exam City" name="Exam City" value="Lahore">
        <label for="Lahore">Lahore</label>
        <input type="radio" id="Exam City" name="Exam City" value="Karachi">
        <label for="Karachi">Karachi</label>
        <input type="radio" id="Exam City" name="Exam City" value="Islamabad">
        <label for="Islamabad">Islamabad</label><br><br>

        <level for="Subjects">Subjects:</level><br>
        <input type="checkbox" id="Subjects" name="Subjects" value="Maths">
        <label for="Maths">Maths</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Physics">       
        <label for="Physics">Physics</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Chemistry">
        <label for="Chemistry">Chemistry</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Biology">
        <label for="Biology">Biology</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="Computer Science">  
        <label for="Computer Science">Computer Science</label>
        <input type="checkbox" id="Subjects" name="Subjects" value="English">
        <label for="English">English</label><br><br>

        <label for="comments">Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br><br>

        <img src="https://www.simplilearn.com/ice9/free_resources_article_thumb/full-stack-developer.jpg" alt="Full Stack Developer Skills Grid" width="200"><br><br>
        
        <input type="submit" value="Submit">
        </form>
</body>
</html>
